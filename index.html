<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>구독 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── 테마 변수 ──────────────────────────────────────── */
[data-theme="dark"] {
  --bg: #0e0e12;
  --surface: #16161d;
  --surface2: #1e1e28;
  --surface3: #252535;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0f0f0;
  --text-dim: #999;
  --text-muted: #555;
  --accent: #b8ff57;
  --accent2: #57c8ff;
  --accent3: #ff7eb3;
  --accent-text: #0e0e12;
  --shadow: rgba(0,0,0,0.5);
  --cal-today-ring: rgba(184,255,87,0.35);
}
[data-theme="light"] {
  --bg: #f4f4f7;
  --surface: #ffffff;
  --surface2: #f0f0f4;
  --surface3: #e8e8f0;
  --border: rgba(0,0,0,0.07);
  --border2: rgba(0,0,0,0.12);
  --text: #1a1a24;
  --text-dim: #666;
  --text-muted: #aaa;
  --accent: #5abf00;
  --accent2: #0095d4;
  --accent3: #d9306e;
  --accent-text: #ffffff;
  --shadow: rgba(0,0,0,0.1);
  --cal-today-ring: rgba(90,191,0,0.3);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
  max-width: 640px;
  margin: 0 auto;
  padding-bottom: 80px;
}

/* ── 탑바 ── */
.topbar {
  display: flex;
  align-items: center;
  padding: 16px 20px 0;
  gap: 8px;
}
.topbar-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
  color: var(--accent);
  flex: 1;
}
.theme-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  cursor: pointer;
  font-size: 16px;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.2s, background 0.2s;
}
.theme-btn:active { transform: scale(0.9); }

/* ── 탭 네비게이션 ── */
.tab-nav {
  display: flex;
  gap: 4px;
  padding: 12px 20px 0;
}
.tab-btn {
  flex: 1;
  padding: 10px 0;
  border: none;
  border-radius: 10px;
  background: transparent;
  color: var(--text-dim);
  font-size: 13px;
  font-weight: 600;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.tab-btn.active {
  background: var(--accent);
  color: var(--accent-text);
}

/* ── 탭 패널 ── */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ══════════════════════════════════════
   LIST TAB
══════════════════════════════════════ */

/* 헤더 */
.header {
  padding: 24px 20px 16px;
}
.header-date {
  font-size: 12px;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 4px;
}
.header h1 {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

/* 요약 카드 */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 0 20px 12px;
}
.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  transition: background 0.3s, border-color 0.3s;
}
.summary-card.wide { grid-column: 1 / -1; }
.sc-label {
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 5px;
}
.sc-value {
  font-size: 24px;
  font-weight: 800;
  letter-spacing: -0.5px;
}
.sc-value.g { color: var(--accent); }
.sc-value.b { color: var(--accent2); }
.sc-sub { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

/* 다가오는 결제 */
.upcoming-wrap { display: flex; flex-direction: column; gap: 5px; margin-top: 6px; }
.upcoming-chip {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(255,126,179,0.1);
  border: 1px solid rgba(255,126,179,0.2);
  border-radius: 99px;
  padding: 4px 10px;
  font-size: 12px;
  color: var(--accent3);
  font-family: 'DM Mono', monospace;
  width: fit-content;
}
[data-theme="light"] .upcoming-chip {
  background: rgba(217,48,110,0.08);
  border-color: rgba(217,48,110,0.2);
}
.dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); animation: blink 1.5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

/* 연간 바 */
.yearly-bar {
  margin: 0 20px 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  transition: background 0.3s;
}
.yb-left .yb-label { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 3px; }
.yb-left .yb-value { font-size: 20px; font-weight: 800; color: var(--accent2); }
.yb-right { font-size: 11px; color: var(--text-muted); text-align: right; line-height: 1.5; }

/* 툴바 */
.toolbar {
  display: flex; align-items: center; gap: 8px;
  padding: 0 20px 12px;
}
.toolbar-label { font-size: 14px; font-weight: 700; flex: 1; }
.sort-select {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-size: 12px;
  padding: 7px 10px;
  font-family: 'Noto Sans KR', sans-serif;
  cursor: pointer; outline: none;
  transition: background 0.3s;
}
.sort-select option { background: var(--surface2); }

/* 추가 버튼 */
.add-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 0 20px 16px;
  background: var(--accent);
  color: var(--accent-text);
  border: none;
  border-radius: 14px;
  padding: 15px;
  font-size: 14px; font-weight: 700;
  cursor: pointer;
  font-family: 'Noto Sans KR', sans-serif;
  transition: transform 0.15s, opacity 0.15s;
  box-shadow: 0 4px 16px var(--shadow);
}
.add-btn:active { transform: scale(0.97); }

/* 구독 리스트 */
.list { padding: 0 20px; display: flex; flex-direction: column; gap: 9px; }
.sub-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  display: flex; align-items: center; gap: 12px;
  position: relative; overflow: hidden;
  transition: border-color 0.2s, opacity 0.2s, background 0.3s;
  animation: slideIn 0.25s ease both;
}
@keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.sub-card.inactive { opacity: 0.4; }
.accent-line { position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 3px 0 0 3px; }
.sub-icon {
  width: 46px; height: 46px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  background: var(--surface2);
}
.sub-info { flex: 1; min-width: 0; }
.sub-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sub-memo { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
.sub-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
.sub-price { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }
.sub-cycle { font-size: 10px; color: var(--text-muted); background: var(--surface2); padding: 2px 7px; border-radius: 99px; }
.sub-day { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; }
.sub-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; border-radius: 6px; font-size: 14px; transition: color 0.15s; line-height: 1; }
.icon-btn:hover { color: var(--text); }
.icon-btn.del:hover { color: #ff5c5c; }

/* 토글 */
.toggle {
  width: 42px; height: 24px; background: var(--surface3);
  border-radius: 99px; position: relative; cursor: pointer;
  border: 1px solid var(--border2); transition: background 0.2s, border-color 0.2s;
}
.toggle.on { background: var(--accent); border-color: var(--accent); }
.toggle::after {
  content: ''; position: absolute;
  width: 18px; height: 18px; border-radius: 50%;
  background: #fff; top: 2px; left: 2px;
  transition: transform 0.2s;
  box-shadow: 0 1px 4px rgba(0,0,0,0.25);
}
.toggle.on::after { transform: translateX(18px); }

/* 빈 상태 */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-muted); }
.empty-state .es-icon { font-size: 44px; margin-bottom: 12px; }
.empty-state p { font-size: 13px; line-height: 1.7; }

/* ══════════════════════════════════════
   CALENDAR TAB
══════════════════════════════════════ */
.cal-header {
  display: flex; align-items: center; gap: 12px;
  padding: 24px 20px 16px;
}
.cal-header h2 { font-size: 22px; font-weight: 800; flex: 1; }
.cal-nav-btn {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1.5px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.cal-nav-btn:hover { background: var(--surface2); }
.cal-today-btn {
  font-size: 11px; font-weight: 700;
  color: var(--accent2);
  font-family: 'DM Mono', monospace;
  background: transparent;
  border: 1.5px solid var(--accent2);
  border-radius: 99px;
  padding: 5px 11px;
  cursor: pointer;
  transition: background 0.2s, color 0.2s;
}
.cal-today-btn:hover {
  background: var(--accent2);
  color: #fff;
}
.cal-month-total {
  font-size: 12px; font-weight: 700;
  color: var(--accent);
  font-family: 'DM Mono', monospace;
  background: rgba(184,255,87,0.1);
  border: 1px solid rgba(184,255,87,0.2);
  border-radius: 99px;
  padding: 5px 12px;
}
[data-theme="light"] .cal-month-total {
  background: rgba(90,191,0,0.1);
  border-color: rgba(90,191,0,0.2);
}

/* 요일 헤더 */
.cal-weekdays {
  display: grid; grid-template-columns: repeat(7, 1fr);
  padding: 0 12px;
  margin-bottom: 4px;
}
.cal-weekday {
  text-align: center;
  font-size: 11px;
  font-family: 'DM Mono', monospace;
  color: var(--text-muted);
  padding: 6px 0;
}
.cal-weekday:first-child { color: #ff6b6b; }
.cal-weekday:last-child { color: var(--accent2); }

/* 달력 그리드 */
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 4px;
  padding: 0 12px 20px;
}
.cal-cell {
  aspect-ratio: 1;
  border-radius: 10px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-start;
  padding: 6px 2px 4px;
  cursor: default;
  position: relative;
  transition: background 0.15s;
  min-height: 52px;
}
.cal-cell.has-event { cursor: pointer; }
.cal-cell.has-event:hover { background: var(--surface2); }
.cal-cell.today {
  background: var(--surface2);
  box-shadow: 0 0 0 2px var(--accent);
}
.cal-cell.other-month { opacity: 0.25; }
.cal-day-num {
  font-size: 12px;
  font-weight: 600;
  font-family: 'DM Mono', monospace;
  color: var(--text);
  margin-bottom: 2px;
  line-height: 1;
}
.cal-cell.today .cal-day-num { color: var(--accent); }
.cal-cell:nth-child(7n+1) .cal-day-num { color: #ff6b6b; }
.cal-cell.today:nth-child(7n+1) .cal-day-num { color: var(--accent); }
.cal-cell:nth-child(7n) .cal-day-num { color: var(--accent2); }
.cal-cell.today:nth-child(7n) .cal-day-num { color: var(--accent); }

/* 이벤트 도트 */
.cal-dots {
  display: flex; flex-wrap: wrap;
  justify-content: center; gap: 2px;
  width: 100%;
  margin-top: 2px;
}
.cal-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* 날짜 클릭 시 뜨는 구독 목록 */
.cal-detail {
  margin: 0 12px 16px;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  overflow: hidden;
  display: none;
  animation: fadeIn 0.2s ease;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
.cal-detail.open { display: block; }
.cal-detail-header {
  padding: 12px 16px;
  font-size: 13px; font-weight: 700;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.cal-detail-header .cd-date { color: var(--accent); font-family: 'DM Mono', monospace; }
.cal-detail-close {
  background: none; border: none; color: var(--text-muted);
  cursor: pointer; font-size: 16px; line-height: 1; padding: 2px;
}
.cal-detail-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
}
.cal-detail-item:last-child { border-bottom: none; }
.cdi-icon { font-size: 20px; }
.cdi-info { flex: 1; }
.cdi-name { font-size: 13px; font-weight: 600; }
.cdi-cycle { font-size: 11px; color: var(--text-muted); }
.cdi-price { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }

/* 월 지출 리스트 */
.cal-month-subs {
  margin: 0 12px 20px;
}
.cms-title {
  font-size: 11px; letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
  padding: 0 4px 10px;
}
.cms-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 7px;
  transition: background 0.3s;
}
.cms-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cms-name { font-size: 13px; font-weight: 500; flex: 1; }
.cms-day { font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }
.cms-price { font-size: 13px; font-weight: 700; color: var(--accent); font-family: 'DM Mono', monospace; }

/* ══════════════════════════════════════
   MODAL — 스와이프 드로어
══════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(6px);
  z-index: 200;
  display: flex;
  align-items: flex-end; justify-content: center;
  /* 오버레이 자체는 항상 존재하지만 투명도/포인터로 제어 */
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}
.modal-overlay.open {
  opacity: 1;
  pointer-events: all;
}

.modal {
  background: var(--surface);
  border-radius: 24px 24px 0 0;
  padding: 12px 20px calc(44px + env(safe-area-inset-bottom));
  width: 100%; max-width: 640px;
  max-height: 92vh;
  max-height: 92dvh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  /* 항상 렌더되어 있고 transform으로만 위치 제어 */
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
  will-change: transform;
  touch-action: pan-y;
}
.modal-overlay.open .modal {
  transform: translateY(0);
}
.modal-overlay.closing {
  opacity: 0;
  pointer-events: none;
}

/* 핸들 — 드래그 가능 영역 */
.modal-handle-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 10px 0 16px;
  cursor: grab;
  user-select: none;
  -webkit-user-select: none;
  margin: -12px -20px 0;
  padding: 14px 20px 16px;
  touch-action: none;
}
.modal-handle-area:active { cursor: grabbing; }
.modal-handle {
  width: 36px; height: 4px;
  background: var(--border2);
  border-radius: 99px;
}

.modal h2 { font-size: 18px; font-weight: 800; margin-bottom: 18px; }
.form-group { margin-bottom: 13px; }
.form-group label { display: block; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 5px; }
.form-group input, .form-group select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px; padding: 12px 13px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none; transition: border-color 0.2s, background 0.3s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--accent); }
.form-group select option { background: var(--surface2); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.emoji-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.emoji-btn {
  aspect-ratio: 1; background: var(--surface2);
  border: 1.5px solid transparent; border-radius: 9px;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: border-color 0.15s, transform 0.1s;
}
.emoji-btn.selected { border-color: var(--accent); transform: scale(1.1); }
.color-grid { display: flex; gap: 8px; flex-wrap: wrap; }
.color-dot-btn {
  width: 26px; height: 26px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent;
  transition: transform 0.15s, border-color 0.15s;
}
.color-dot-btn.selected { transform: scale(1.2); border-color: var(--text); }
.modal-actions { display: flex; gap: 10px; margin-top: 18px; }
.btn-cancel {
  flex: 1; background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; color: var(--text-dim);
  font-size: 14px; font-weight: 600; padding: 13px;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
  transition: background 0.2s;
}
.btn-save {
  flex: 2; background: var(--accent); border: none;
  border-radius: 10px; color: var(--accent-text);
  font-size: 14px; font-weight: 700; padding: 13px;
  cursor: pointer; font-family: 'Noto Sans KR', sans-serif;
}
</style>
</head>
<body>

<!-- 탑바 -->
<div class="topbar">
  <div class="topbar-title">SUBTRACK</div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="테마 전환">🌙</button>
</div>

<!-- 탭 네비게이션 -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="switchTab('list', this)">📋 목록</button>
  <button class="tab-btn" onclick="switchTab('calendar', this)">📅 달력</button>
</div>

<!-- ══ 목록 탭 ══════════════════════════════════════════ -->
<div class="tab-panel active" id="tab-list">
  <div class="header">
    <div class="header-date" id="headerDate"></div>
    <h1>내 구독 관리</h1>
  </div>

  <div class="summary-grid">
    <div class="summary-card">
      <div class="sc-label">월 총액</div>
      <div class="sc-value g" id="totalMonthly">0원</div>
      <div class="sc-sub">/월 (활성)</div>
    </div>
    <div class="summary-card">
      <div class="sc-label">활성 구독</div>
      <div class="sc-value b" id="totalActive">0개</div>
      <div class="sc-sub">서비스</div>
    </div>
    <div class="summary-card wide" id="upcomingCard" style="display:none">
      <div class="sc-label">🔔 다가오는 결제 (7일 이내)</div>
      <div class="upcoming-wrap" id="upcomingList"></div>
    </div>
  </div>

  <div class="yearly-bar">
    <div class="yb-left">
      <div class="yb-label">연간 환산</div>
      <div class="yb-value" id="totalYearly">0원</div>
    </div>
    <div class="yb-right" id="yearlyBreak"></div>
  </div>

  <div class="toolbar">
    <div class="toolbar-label">내 구독 목록</div>
    <select class="sort-select" id="sortSelect" onchange="renderList()">
      <option value="order">등록순</option>
      <option value="price-desc">금액 높은순</option>
      <option value="price-asc">금액 낮은순</option>
      <option value="day">결제일순</option>
      <option value="name">이름순</option>
    </select>
  </div>

  <button class="add-btn" onclick="openModal()">＋ 새 구독 추가</button>

  <div class="list" id="subList"></div>
</div>

<!-- ══ 달력 탭 ═════════════════════════════════════════ -->
<div class="tab-panel" id="tab-calendar">
  <div class="cal-header">
    <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
    <h2 id="calTitle"></h2>
    <div class="cal-month-total" id="calMonthTotal"></div>
    <button class="cal-today-btn" onclick="goToday()">오늘</button>
    <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="cal-weekdays">
    <div class="cal-weekday">일</div>
    <div class="cal-weekday">월</div>
    <div class="cal-weekday">화</div>
    <div class="cal-weekday">수</div>
    <div class="cal-weekday">목</div>
    <div class="cal-weekday">금</div>
    <div class="cal-weekday">토</div>
  </div>

  <div class="cal-grid" id="calGrid"></div>

  <div class="cal-detail" id="calDetail">
    <div class="cal-detail-header">
      <span id="calDetailDate" class="cd-date"></span>
      <button class="cal-detail-close" onclick="closeCalDetail()">✕</button>
    </div>
    <div id="calDetailItems"></div>
  </div>

  <div class="cal-month-subs">
    <div class="cms-title">이달의 결제 일정</div>
    <div id="calMonthList"></div>
  </div>
</div>

<!-- ══ 모달 ═════════════════════════════════════════════ -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalSheet">
    <!-- 핸들 (드래그로 닫기) -->
    <div class="modal-handle-area" id="modalHandleArea">
      <div class="modal-handle"></div>
    </div>

    <h2 id="modalTitle">새 구독 추가</h2>

    <div class="form-group">
      <label>서비스 이름</label>
      <input type="text" id="inputName" placeholder="예: 넷플릭스">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>금액</label>
        <input type="number" id="inputPrice" placeholder="0">
      </div>
      <div class="form-group">
        <label>통화</label>
        <select id="inputCurrency">
          <option value="KRW">₩ 원</option>
          <option value="USD">$ 달러</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>결제 주기</label>
        <select id="inputCycle">
          <option value="monthly">매월</option>
          <option value="bimonthly">2개월</option>
          <option value="quarterly">분기(3개월)</option>
          <option value="yearly">연간</option>
        </select>
      </div>
      <div class="form-group">
        <label>결제일 (일)</label>
        <input type="number" id="inputDay" placeholder="1~31" min="1" max="31">
      </div>
    </div>
    <div class="form-group">
      <label>아이콘</label>
      <div class="emoji-grid" id="emojiGrid"></div>
    </div>
    <div class="form-group">
      <label>색상 태그</label>
      <div class="color-grid" id="colorGrid"></div>
    </div>
    <div class="form-group">
      <label>메모 (선택)</label>
      <input type="text" id="inputMemo" placeholder="예: 가족 공유, 유독 할인 등">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">취소</button>
      <button class="btn-save" onclick="saveSubscription()">저장하기</button>
    </div>
  </div>
</div>

<script>
/* ── 상수 ──────────────────────────────────────────────── */
const EMOJIS = ['📺','🎵','🎮','📚','☁️','🛒','🤖','💊','🏋️','🎬','📰','🎯','💳','🔒','🌐','✉️','📦','🐯','⚽','⚾','🎸','🍿','🖥️'];
const COLORS  = ['#b8ff57','#57c8ff','#ff7eb3','#ffd166','#a29bfe','#fd79a8','#00cec9','#e17055','#6c5ce7','#00b894','#ff3b3b'];
const USD_KRW = 1380;

// 기본 구독 없이 빈 상태로 시작
let subs = JSON.parse(localStorage.getItem('subList') || '[]');
let editingId = null;
let selectedEmoji = EMOJIS[0];
let selectedColor = COLORS[0];
let calYear, calMonth;

/* ── 테마 ─────────────────────────────────────────────── */
const savedTheme = localStorage.getItem('theme') || 'light';
document.documentElement.setAttribute('data-theme', savedTheme);
document.getElementById('themeBtn').textContent = savedTheme === 'dark' ? '🌙' : '☀️';

function toggleTheme() {
  const cur = document.documentElement.getAttribute('data-theme');
  const next = cur === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  document.getElementById('themeBtn').textContent = next === 'dark' ? '🌙' : '☀️';
}

/* ── 탭 전환 ──────────────────────────────────────────── */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'calendar') renderCalendar();
}

/* ── 유틸 ─────────────────────────────────────────────── */
function save() { localStorage.setItem('subList', JSON.stringify(subs)); }

function priceLabel(s) {
  if (s.currency === 'USD') return `$${s.price}`;
  return s.price.toLocaleString() + '원';
}
function cycleLabel(c) {
  return { monthly:'매월', bimonthly:'2개월', quarterly:'분기', yearly:'연간' }[c] || '매월';
}
function toMonthlyKRW(s) {
  if (!s.active) return 0;
  const base = s.currency === 'USD' ? s.price * USD_KRW : s.price;
  const div  = { monthly:1, bimonthly:2, quarterly:3, yearly:12 }[s.cycle] || 1;
  return base / div;
}

/* ── 날짜 ─────────────────────────────────────────────── */
const today = new Date();
const DAY_KO = ['일','월','화','수','목','금','토'];
document.getElementById('headerDate').textContent =
  `${today.getFullYear()}년 ${today.getMonth()+1}월 ${today.getDate()}일 (${DAY_KO[today.getDay()]})`;
calYear  = today.getFullYear();
calMonth = today.getMonth();

/* ── 요약 업데이트 ──────────────────────────────────────── */
function updateSummary() {
  const active  = subs.filter(s => s.active);
  const monthly = active.reduce((a, s) => a + toMonthlyKRW(s), 0);
  document.getElementById('totalMonthly').textContent = Math.round(monthly).toLocaleString() + '원';
  document.getElementById('totalActive').textContent  = active.length + '개';
  document.getElementById('totalYearly').textContent  = Math.round(monthly * 12).toLocaleString() + '원';

  const hasUSD = active.some(s => s.currency === 'USD');
  document.getElementById('yearlyBreak').innerHTML = hasUSD
    ? `USD 포함<br>1달러 ≈ ${USD_KRW.toLocaleString()}원 적용` : '';

  // 오늘부터 7일 후까지 날짜 Set 생성 (월 말 넘어가는 경우 포함)
  const upcomingDays = new Set();
  for (let i = 0; i <= 7; i++) {
    const d = new Date(today.getFullYear(), today.getMonth(), today.getDate() + i);
    upcomingDays.add(d.getDate());
  }
  const upcoming = subs.filter(s => s.active && upcomingDays.has(s.day))
    .sort((a, b) => {
      // 실제 다가오는 날짜 기준 정렬
      const nextA = new Date(today.getFullYear(), today.getMonth(), a.day);
      if (nextA < today) nextA.setMonth(nextA.getMonth() + 1);
      const nextB = new Date(today.getFullYear(), today.getMonth(), b.day);
      if (nextB < today) nextB.setMonth(nextB.getMonth() + 1);
      return nextA - nextB;
    });
  const upCard = document.getElementById('upcomingCard');
  if (upcoming.length) {
    upCard.style.display = '';
    document.getElementById('upcomingList').innerHTML = upcoming.map(s =>
      `<div class="upcoming-chip"><span class="dot"></span>${s.day}일 · ${s.name} (${priceLabel(s)})</div>`
    ).join('');
  } else {
    upCard.style.display = 'none';
  }
}

/* ── 리스트 렌더링 ──────────────────────────────────────── */
function renderList() {
  const sort = document.getElementById('sortSelect').value;
  let list = [...subs];
  if (sort === 'price-desc') list.sort((a,b) => toMonthlyKRW(b) - toMonthlyKRW(a));
  else if (sort === 'price-asc') list.sort((a,b) => toMonthlyKRW(a) - toMonthlyKRW(b));
  else if (sort === 'day')  list.sort((a,b) => a.day - b.day);
  else if (sort === 'name') list.sort((a,b) => a.name.localeCompare(b.name));

  const el = document.getElementById('subList');
  if (!list.length) {
    el.innerHTML = `<div class="empty-state"><div class="es-icon">📋</div><p>아직 등록된 구독이 없어요.<br>첫 구독을 추가해보세요!</p></div>`;
    updateSummary(); return;
  }
  el.innerHTML = list.map(s => `
    <div class="sub-card ${s.active ? '' : 'inactive'}">
      <div class="accent-line" style="background:${s.color}"></div>
      <div class="sub-icon">${s.emoji}</div>
      <div class="sub-info">
        <div class="sub-name">${s.name}</div>
        ${s.memo ? `<div class="sub-memo">${s.memo}</div>` : ''}
        <div class="sub-meta">
          <span class="sub-price">${priceLabel(s)}</span>
          <span class="sub-cycle">${cycleLabel(s.cycle)}</span>
          <span class="sub-day">${s.day}일</span>
        </div>
      </div>
      <div class="sub-actions">
        <button class="icon-btn" onclick="editSub(${s.id})">✏️</button>
        <button class="icon-btn del" onclick="deleteSub(${s.id})">🗑</button>
        <div class="toggle ${s.active ? 'on' : ''}" onclick="toggleSub(${s.id})"></div>
      </div>
    </div>
  `).join('');
  updateSummary();
}

/* ── 토글 / 삭제 / 수정 ─────────────────────────────────── */
function toggleSub(id) {
  const s = subs.find(x => x.id === id);
  if (s) { s.active = !s.active; save(); renderList(); }
}
function deleteSub(id) {
  if (!confirm('이 구독을 삭제할까요?')) return;
  subs = subs.filter(x => x.id !== id);
  save(); renderList();
}
function editSub(id) {
  const s = subs.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  document.getElementById('modalTitle').textContent = '구독 수정';
  document.getElementById('inputName').value     = s.name;
  document.getElementById('inputPrice').value    = s.price;
  document.getElementById('inputCurrency').value = s.currency;
  document.getElementById('inputCycle').value    = s.cycle;
  document.getElementById('inputDay').value      = s.day;
  document.getElementById('inputMemo').value     = s.memo || '';
  selectedEmoji = s.emoji;
  selectedColor = s.color;
  buildEmojiGrid(); buildColorGrid();
  openModal();
}

/* ══ 달력 렌더링 ═══════════════════════════════════════ */
function renderCalendar() {
  const year = calYear, month = calMonth;
  document.getElementById('calTitle').textContent = `${year}년 ${month+1}월`;

  const activeSubs = subs.filter(s => s.active);
  const monthlyTotal = activeSubs.reduce((a, s) => a + toMonthlyKRW(s), 0);
  document.getElementById('calMonthTotal').textContent = Math.round(monthlyTotal).toLocaleString() + '원/월';

  const dayMap = {};
  activeSubs.forEach(s => {
    const d = s.day;
    if (!dayMap[d]) dayMap[d] = [];
    dayMap[d].push(s);
  });

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();
  const prevLast = new Date(year, month, 0).getDate();
  const todayD = today.getDate(), todayM = today.getMonth(), todayY = today.getFullYear();

  let cells = '';
  let cellCount = 0;

  for (let i = firstDay - 1; i >= 0; i--) {
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${prevLast - i}</div></div>`;
    cellCount++;
  }
  for (let d = 1; d <= lastDate; d++) {
    const isToday = d === todayD && month === todayM && year === todayY;
    const events  = dayMap[d] || [];
    const hasDots = events.length > 0;
    const dots    = events.slice(0, 5).map(s => `<div class="cal-dot" style="background:${s.color}"></div>`).join('');
    cells += `
      <div class="cal-cell${isToday ? ' today' : ''}${hasDots ? ' has-event' : ''}"
           onclick="${hasDots ? `showCalDetail(${d})` : ''}">
        <div class="cal-day-num">${d}</div>
        ${hasDots ? `<div class="cal-dots">${dots}</div>` : ''}
      </div>`;
    cellCount++;
  }
  const remain = 42 - cellCount;
  for (let d = 1; d <= remain; d++) {
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;
  }

  document.getElementById('calGrid').innerHTML = cells;
  closeCalDetail();

  const sorted = activeSubs.slice().sort((a, b) => a.day - b.day);
  document.getElementById('calMonthList').innerHTML = sorted.map(s => `
    <div class="cms-item">
      <div class="cms-dot" style="background:${s.color}"></div>
      <span style="font-size:16px">${s.emoji}</span>
      <span class="cms-name">${s.name}</span>
      <span class="cms-day">${s.day}일</span>
      <span class="cms-price">${priceLabel(s)}</span>
    </div>
  `).join('');
}

function goToday() {
  calYear  = today.getFullYear();
  calMonth = today.getMonth();
  closeCalDetail();
  renderCalendar();
}

function changeMonth(dir) {
  calMonth += dir;
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  if (calMonth > 11) { calMonth = 0;  calYear++; }
  closeCalDetail();
  renderCalendar();
}

function showCalDetail(day) {
  const activeSubs = subs.filter(s => s.active);
  const events = activeSubs.filter(s => s.day === day);
  if (!events.length) return;

  document.getElementById('calDetailDate').textContent = `${calYear}년 ${calMonth+1}월 ${day}일`;
  document.getElementById('calDetailItems').innerHTML = events.map(s => `
    <div class="cal-detail-item">
      <div class="cdi-icon">${s.emoji}</div>
      <div class="cdi-info">
        <div class="cdi-name">${s.name}</div>
        <div class="cdi-cycle">${cycleLabel(s.cycle)}${s.memo ? ' · ' + s.memo : ''}</div>
      </div>
      <div class="cdi-price">${priceLabel(s)}</div>
    </div>
  `).join('');

  const detail = document.getElementById('calDetail');
  detail.classList.add('open');
  detail.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function closeCalDetail() {
  document.getElementById('calDetail').classList.remove('open');
}

/* ══ 모달 — 슬라이드 드로어 ══════════════════════════════ */
const overlay  = document.getElementById('modalOverlay');
const sheet    = document.getElementById('modalSheet');
const handleArea = document.getElementById('modalHandleArea');

let dragStartY = 0;
let dragCurrentY = 0;
let isDragging = false;

function openModal() {
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(callback) {
  // sheet를 명시적으로 아래로 내림
  sheet.style.transition = 'transform 0.32s cubic-bezier(0.4, 0, 0.8, 0.2)';
  sheet.style.transform  = 'translateY(100%)';
  overlay.classList.add('closing');

  sheet.addEventListener('transitionend', function onEnd() {
    sheet.removeEventListener('transitionend', onEnd);
    overlay.classList.remove('open', 'closing');
    sheet.style.transform  = '';
    sheet.style.transition = '';
    document.body.style.overflow = '';
    editingId = null;
    document.getElementById('modalTitle').textContent = '새 구독 추가';
    ['inputName','inputPrice','inputMemo'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inputCurrency').value = 'KRW';
    document.getElementById('inputCycle').value    = 'monthly';
    document.getElementById('inputDay').value      = '';
    selectedEmoji = EMOJIS[0]; selectedColor = COLORS[0];
    buildEmojiGrid(); buildColorGrid();
    if (callback) callback();
  });
}

// 오버레이 배경 클릭 → 닫기
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});

// ── 드래그 핸들 (터치) ──
handleArea.addEventListener('touchstart', (e) => {
  isDragging = true;
  dragStartY = e.touches[0].clientY;
  sheet.style.transition = 'none';
}, { passive: true });

handleArea.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  dragCurrentY = e.touches[0].clientY;
  const delta = Math.max(0, dragCurrentY - dragStartY); // 아래로만 허용
  sheet.style.transform = `translateY(${delta}px)`;
}, { passive: true });

handleArea.addEventListener('touchend', () => {
  isDragging = false;
  sheet.style.transition = '';
  const delta = dragCurrentY - dragStartY;
  if (delta > 100) {
    // 충분히 내렸으면 닫기
    closeModal();
  } else {
    // 원위치
    sheet.style.transform = '';
  }
  dragStartY = 0; dragCurrentY = 0;
});

// ── 드래그 핸들 (마우스) ──
handleArea.addEventListener('mousedown', (e) => {
  isDragging = true;
  dragStartY = e.clientY;
  sheet.style.transition = 'none';
  document.addEventListener('mousemove', onMouseMove);
  document.addEventListener('mouseup', onMouseUp);
});

function onMouseMove(e) {
  if (!isDragging) return;
  dragCurrentY = e.clientY;
  const delta = Math.max(0, dragCurrentY - dragStartY);
  sheet.style.transform = `translateY(${delta}px)`;
}
function onMouseUp() {
  isDragging = false;
  sheet.style.transition = '';
  const delta = dragCurrentY - dragStartY;
  if (delta > 100) {
    closeModal();
  } else {
    sheet.style.transform = '';
  }
  dragStartY = 0; dragCurrentY = 0;
  document.removeEventListener('mousemove', onMouseMove);
  document.removeEventListener('mouseup', onMouseUp);
}

function saveSubscription() {
  const name  = document.getElementById('inputName').value.trim();
  const price = parseFloat(document.getElementById('inputPrice').value) || 0;
  const currency = document.getElementById('inputCurrency').value;
  const cycle    = document.getElementById('inputCycle').value;
  const day      = parseInt(document.getElementById('inputDay').value) || 1;
  const memo     = document.getElementById('inputMemo').value.trim();
  if (!name) { alert('서비스 이름을 입력해주세요.'); return; }

  if (editingId) {
    const s = subs.find(x => x.id === editingId);
    Object.assign(s, { name, price, currency, cycle, day, emoji:selectedEmoji, color:selectedColor, memo });
  } else {
    subs.push({ id:Date.now(), name, price, currency, cycle, day, emoji:selectedEmoji, color:selectedColor, active:true, memo });
  }
  save();
  // 저장 후 모달 내리면서 닫기, 끝나면 리스트 갱신
  closeModal(() => renderList());
}

/* ── 이모지 / 색상 그리드 ──────────────────────────────── */
function buildEmojiGrid() {
  document.getElementById('emojiGrid').innerHTML = EMOJIS.map(e =>
    `<button class="emoji-btn ${e === selectedEmoji ? 'selected' : ''}" onclick="selectEmoji('${e}')">${e}</button>`
  ).join('');
}
function selectEmoji(e) { selectedEmoji = e; buildEmojiGrid(); }

function buildColorGrid() {
  document.getElementById('colorGrid').innerHTML = COLORS.map(c =>
    `<div class="color-dot-btn ${c === selectedColor ? 'selected' : ''}"
          style="background:${c}" onclick="selectColor('${c}')"></div>`
  ).join('');
}
function selectColor(c) { selectedColor = c; buildColorGrid(); }

/* ── 초기 실행 ────────────────────────────────────────── */
buildEmojiGrid(); buildColorGrid(); renderList();
</script>
</body>
</html>
